; Local extensions to tomte's canonical tox.ini. Consumed by `tomte tox`.

[tomte-extensions]
; Most runtime deps auto-mirror from [project].dependencies. Listed here
; are lint-only extras NOT in pyproject (used by lint envs but not at
; runtime).
extra_deps =
    typing_extensions<=4.15.0,>=3.10.0.2
    protobuf<6,>=5
    multiaddr==0.0.9
    py-eth-sig-utils

; Repo-specific extras. Canonical defaults (`integration`/`e2e` markers,
; `aea.*` DeprecationWarning filter) come from tomte's pytest plugin —
; opt in via `tomte_defaults = true` (the plugin is silent otherwise so
; non-fleet `tomte[black]` consumers don't get unexpected config injection).
[pytest]
tomte_defaults = true
; anchorpy 0.20.2 (pulled transitively via open-aea-ledger-solana since
; open-autonomy 0.21.20) ships a pytest plugin with a broken import
; (`from pytest_xprocess import getrootdir` — top-level module is
; `xprocess` in modern pytest-xprocess). Pytest's `-p no:` disables a
; pytest11 entry point before its module is imported; the entry point
; name is `pytest_anchorpy` (per anchorpy's dist-info). No tests in
; this repo use anchorpy fixtures.
addopts = -p no:pytest_anchorpy
log_cli = 1
log_cli_level = DEBUG
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)
log_cli_date_format=%Y-%m-%d %H:%M:%S

markers =
    unstable: marks test as unstable (won't be run in CI)
    ledger: marks tests which require ledger test networks (ethereum, cosmos, fetchai); these tests should also be marked 'integration'
    flaky: marks tests which are flaky and worth re-running
    sync: marks test for run in sync mode
    profiling: marks profiler tests that must be run separately to avoid garbage collector interferences

filterwarnings =
    ignore:the imp module is deprecated in favour of importlib:DeprecationWarning
    ignore:Call to deprecated create function FileDescriptor().
    ignore:Call to deprecated create function Descriptor().
    ignore:Call to deprecated create function FieldDescriptor().
    ignore:Call to deprecated create function EnumValueDescriptor().
    ignore:Call to deprecated create function EnumDescriptor().
    ignore:'resultcallback' has been renamed to 'result_callback'. The old name will be removed in Click 8.1.
    ignore:There is no current event loop

[mypy]
warn_unused_ignores = False
warn_redundant_casts = False
disable_error_code = redundant-cast,unused-ignore

; Repo-specific overrides (third-party packages synced via IPFS, not lint-clean).
[mypy-packages.valory.connections.*]
ignore_errors = True

[mypy-packages.valory.contracts.gnosis_safe.*]
ignore_errors = True

[mypy-packages.valory.contracts.gnosis_safe_proxy_factory.*]
ignore_errors = True

[mypy-packages.valory.contracts.multisend.*]
ignore_errors = True

[mypy-packages.valory.contracts.service_registry.*]
ignore_errors = True

[mypy-packages.valory.skills.abstract_abci.*]
ignore_errors = True

[mypy-packages.valory.skills.abstract_round_abci.*]
ignore_errors = True

[mypy-packages.valory.skills.registration_abci.*]
ignore_errors = True


[Authorized Packages]
; bases / typing-validation: typing utility libraries used by
; mech_interact_abci. PyPI metadata reports UNKNOWN; both ship under MIT.
bases: >=0.3,<0.4
typing-validation: <2,>=1.1
; anchorpy / based58 / jsonalias: transitive deps via open-aea-ledger-solana
; (added by open-autonomy 0.21.20). All three ship under MIT per their
; GitHub repos but expose no License field or Trove classifier, so PARANOID
; liccheck reports them UNKNOWN.
anchorpy: 0.20.2
based58: 0.1.1
jsonalias: 0.1.1
; httpx: pulled in via solana << anchorpy. uv resolves a pre-release
; (1.0.dev*) under prerelease = "allow", and that build's PyPI metadata
; ships no License field. httpx is BSD-3-Clause upstream. semantic_version
; (used by liccheck) rejects PEP 440 dev specifiers, so use a SemVer
; comparison that matches the resolved 1.0.0-devN tags.
httpx: >=1.0.0-dev,<2
